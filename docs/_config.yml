title: Windrose Dedicated Server
description: Self-hosted Windrose dedicated server on Linux via Docker, SteamCMD, and Wine.
remote_theme: just-the-docs/just-the-docs
url: https://mrguato.github.io
baseurl: /windrose-dedicated-server

color_scheme: dark

aux_links:
  GitHub repo:
    - https://github.com/MrGuato/windrose-dedicated-server

aux_links_new_tab: true

heading_anchors: true

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

footer_content: 'MIT licensed. Project by <a href="https://github.com/MrGuato">MrGuato</a>.'

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
